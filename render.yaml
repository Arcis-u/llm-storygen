services:
  - type: web
    name: interactive-story-ai-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BACKEND_PORT
        value: 10000
      - key: FRONTEND_URL
        value: "https://your-frontend-url.pages.dev" # Change this after deploying frontend
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: interactive_story
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: story_memory
      - key: QDRANT_API_KEY
        sync: false
      - key: ALIBABA_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
