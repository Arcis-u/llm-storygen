version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: story_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: interactive_story
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: story_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mongo_data:
  qdrant_data:
